---
layout: default
---

<ul class="post-list">
  {% for post in site.posts %}
  <li class="post-item">
    <span class="post-rank">{{ forloop.index }}.</span>
    <div class="post-body">
      <a class="post-link" href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <div class="post-meta">
        <span>{{ post.date | date: "%Y-%m-%d" }}</span>
        {% if post.tags.size > 0 %}
          <span class="sep">·</span>
          {% for tag in post.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
        {% endif %}
        <span class="sep">·</span>
        <a href="{{ post.url | relative_url }}">read</a>
      </div>
    </div>
  </li>
  {% endfor %}
</ul>
