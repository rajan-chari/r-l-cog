---
layout: default
---

<div id="post">
  <h1>{{ page.title }}</h1>
  <div class="meta">
    {% if page.date %}{{ page.date | date: "%d %b %Y" }}{% endif %}
    {% if page.youtube_id %}
      &nbsp;·&nbsp;
      <a href="https://www.youtube.com/watch?v={{ page.youtube_id }}">watch on youtube</a>
    {% endif %}
  </div>

  {% if page.youtube_id %}
  <div class="youtube-embed">
    <iframe
      src="https://www.youtube.com/embed/{{ page.youtube_id }}"
      title="{{ page.title }}"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen></iframe>
  </div>
  {% endif %}

  {{ content }}

  <div class="post-back">
    <a href="{{ '/youtube/' | relative_url }}">&laquo; all videos</a>
  </div>
</div>
