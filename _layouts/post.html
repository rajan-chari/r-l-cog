---
layout: default
---

<article class="post">
  <h1 class="post-title-full">{{ page.title }}</h1>
  <div class="post-meta">
    <span>{{ page.date | date: "%B %-d, %Y" }}</span>
    {% if page.tags.size > 0 %}
      <span class="sep">·</span>
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
    {% endif %}
  </div>
  <div class="post-body-content">
    {{ content }}
  </div>
  <div class="post-back">
    <a href="{{ '/' | relative_url }}">&larr; back to posts</a>
  </div>
</article>
