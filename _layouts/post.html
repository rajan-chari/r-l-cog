---
layout: default
---

<div id="post">
  <h1>{{ page.title }}</h1>
  <div class="meta">
    {{ page.date | date: "%d %b %Y" }}
    {% if page.tags.size > 0 %}
      &nbsp;·&nbsp;
      {% for tag in page.tags %}{{ tag }}{% unless forloop.last %}, {% endunless %}{% endfor %}
    {% endif %}
  </div>

  {{ content }}

  <div class="post-back">
    <a href="{{ '/' | relative_url }}">&laquo; back</a>
  </div>
</div>
