---
layout: default
---

<article class="post">
  <h1 class="post-title-full">{{ page.title }}</h1>
  <div class="post-meta">
    {{ page.date | date: "%Y-%m-%d" }}
    {% if page.tags.size > 0 %}
      | {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% unless forloop.last %} {% endunless %}{% endfor %}
    {% endif %}
  </div>
  <div class="post-body">
    {{ content }}
  </div>
  <div class="post-back">
    <a href="{{ '/' | relative_url }}">&larr; back</a>
  </div>
</article>
