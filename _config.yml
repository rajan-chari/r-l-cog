title: Rajan Chari
tagline: notes and writing
author: Rajan Chari
description: Rajan Chari — notes, experiments, and writing.
baseurl: "/r-l-cog"
url: "https://rajan-chari.github.io"

permalink: /:year/:month/:day/:title/

markdown: kramdown
highlighter: rouge

future: true

collections:
  projects:
    output: true
    permalink: /projects/:path/
  youtube:
    output: true
    permalink: /youtube/:path/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: youtube
    values:
      layout: youtube_entry

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - identity.json
  - .claude
  - .github/copilot
